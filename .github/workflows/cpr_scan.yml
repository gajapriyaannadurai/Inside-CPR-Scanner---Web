name: CPR Daily Scanner

on:
  schedule:
    # Run 1: 9:30 AM IST = 4:00 UTC (after market opens, uses yesterday+day-before data)
    - cron: '0 4 * * 1-5'
    # Run 2: 3:45 PM IST = 10:15 UTC (after market closes, uses today+yesterday data)
    - cron: '15 10 * * 1-5'

  # Manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  fetch-cpr-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance pandas requests

      - name: Run CPR scanner
        run: |
          echo "Starting CPR scan at $(date '+%Y-%m-%d %H:%M:%S UTC') = $(TZ='Asia/Kolkata' date '+%H:%M IST')"
          python fetch_cpr.py

      - name: Commit and push cpr_data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cpr_data.json
          git diff --staged --quiet || git commit -m "CPR data updated — $(TZ='Asia/Kolkata' date '+%d %b %Y %H:%M IST')"
          git push

      - name: Summary
        run: |
          echo "CPR data successfully updated!"
          echo "File size: $(wc -c < cpr_data.json) bytes"
          echo "Mode: $(python -c "import json; d=json.load(open('cpr_data.json')); print(d.get('scan_mode','UNKNOWN'))")"
          echo "Inside CPR stocks: $(python -c "import json; d=json.load(open('cpr_data.json')); print(d.get('inside_count',0))")"
